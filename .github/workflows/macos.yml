name: macOS build

# Builds an UNSIGNED macOS app + DMG on a GitHub macOS runner (no local Mac
# needed). Trigger manually, or it runs on version tags. Signing/notarization
# can be added later via Apple secrets (see docs/BUILD_MACOS.md).

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build macOS app + dmg (unsigned)
    runs-on: macos-14 # Apple Silicon
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Build frontend
        working-directory: ui
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build privileged helper
        run: cargo build --release -p freeyourdisk-helper

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build app bundle (unsigned)
        run: cargo tauri build --bundles app

      - name: Bundle helper + create DMG
        run: |
          set -euo pipefail
          APP=$(find target/release/bundle/macos -maxdepth 1 -name "*.app" | head -1)
          echo "App bundle: $APP"
          cp target/release/freeyourdisk-helper "$APP/Contents/Resources/freeyourdisk-helper"
          chmod +x "$APP/Contents/Resources/freeyourdisk-helper"
          VER=$(awk -F'"' '/^version/{print $2; exit}' Cargo.toml)
          DMG="FreeYourDisk_${VER}_aarch64.dmg"
          hdiutil create -volname "FreeYourDisk" -srcfolder "$APP" -ov -format UDZO "$DMG"
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: freeyourdisk-macos
          path: ${{ env.DMG }}

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.DMG }}
